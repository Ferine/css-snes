<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-SNES</title>
  <link rel="stylesheet" href="./styles/snes-layers.css">
</head>
<body>
  <h1>CSS-SNES — CSS Layer Renderer</h1>

  <div class="toolbar">
    <div class="toolbar-group">
      <label class="rom-label">
        Load ROM
        <input type="file" id="rom-input" accept=".sfc,.smc" hidden>
      </label>
      <button id="btn-hirom" title="Toggle HiROM addressing mode">LoROM</button>
      <button id="btn-pause" disabled>Pause</button>
      <button id="btn-step" disabled>Step</button>
      <button id="btn-toggle-canvas" disabled>Canvas Mode</button>
    </div>

    <div class="toolbar-group">
      <span class="group-label">Layers</span>
      <button id="layer-bg0" class="layer-toggle active" title="Toggle BG1 [1]">BG1</button>
      <button id="layer-bg1" class="layer-toggle active" title="Toggle BG2 [2]">BG2</button>
      <button id="layer-bg2" class="layer-toggle active" title="Toggle BG3 [3]">BG3</button>
      <button id="layer-bg3" class="layer-toggle active" title="Toggle BG4 [4]">BG4</button>
      <button id="layer-sprites" class="layer-toggle active" title="Toggle sprites [S]">OBJ</button>
    </div>

    <div class="toolbar-group">
      <span class="group-label">Debug</span>
      <button id="dbg-tile-grid" class="debug-toggle" title="Tile grid overlay [G]">Grid</button>
      <button id="dbg-sprite-boxes" class="debug-toggle" title="Sprite bounding boxes [B]">Boxes</button>
      <button id="dbg-mode7" class="debug-toggle" title="Mode 7 wireframe [7]">M7</button>
    </div>
  </div>

  <div class="shortcut-strip" aria-label="Keyboard shortcuts">
    <span class="shortcut-title">Keyboard</span>
    <span class="shortcut-item"><kbd>Arrows</kbd> D-pad</span>
    <span class="shortcut-item"><kbd>Z</kbd> B</span>
    <span class="shortcut-item"><kbd>X</kbd> A</span>
    <span class="shortcut-item"><kbd>A</kbd> Y</span>
    <span class="shortcut-item"><kbd>S</kbd> X</span>
    <span class="shortcut-item"><kbd>Enter</kbd> Start</span>
    <span class="shortcut-item"><kbd>RShift</kbd> Select</span>
    <span class="shortcut-item"><kbd>D</kbd> L</span>
    <span class="shortcut-item"><kbd>C</kbd> R</span>
    <span class="shortcut-item"><kbd>1-4</kbd> BG layers</span>
    <span class="shortcut-item"><kbd>S</kbd> Sprites</span>
  </div>

  <div class="main-content">
    <div class="render-area">
      <div class="viewport-wrapper" id="viewport-wrapper">
        <!-- CSS renderer mounts here -->
      </div>
      <canvas id="compare-canvas" class="canvas-mode" width="512" height="480"></canvas>
    </div>
  </div>

  <div class="status-bar">
    <span id="status-bar">Drop a .sfc/.smc ROM or click Load ROM</span>
    <span class="status-counters">
      <span id="fps-counter">-- fps</span>
      <span id="mode-counter" class="stat-dim">-- mode</span>
      <span id="spr-counter" class="stat-dim">-- obj</span>
    </span>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
